name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate JavaScript syntax
        run: |
          node --check src/main.js
          node --check src/ui.js
          node --check src/scene.js
          node --check src/reflections/cubemap.js
          node --check src/reflections/planar.js
          node --check src/reflections/ssr/SSRPass.js
          node --check src/reflections/ssr/shaders.js

      - name: Validate Python helper scripts
        run: |
          python3 -m py_compile \
            scripts/verify_ssr_visual.py \
            scripts/verify_demo_acceptance.py \
            scripts/capture_demo_screenshots.py

      - name: Prepare static site
        run: |
          rm -rf _site
          mkdir -p _site
          cp -R index.html style.css src assets LICENSE README.md _site/
          touch _site/.nojekyll

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
